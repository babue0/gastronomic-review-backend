spring.application.name=Review-Gastronomica

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/guia_michelin?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cloudinary.cloud-name=${CLOUDINARY_NAME:nome_falso}
cloudinary.api-key=${CLOUDINARY_KEY:chave_falsa}
cloudinary.api-secret=${CLOUDINARY_SECRET:senha_falsa}

